# docker-compose.yaml
# changez le container_name si besoin, et activez les mots de passe (en prod)

services:
   mongodb:
        image: mongo:latest
        container_name: mongodb
        ports:
            - "27017:27017"
        # environment:
        #     MONGO_INITDB_ROOT_USERNAME: root
        #     MONGO_INITDB_ROOT_PASSWORD: password
        volumes:
            - mongodb_data:/data/db


volumes:
    mongodb_data:

# RAPPELS
# Construire/relancer   : docker compose up -d
# Stopper le container  : docker compose stop
# Relancer le container : docker compose start
# Tout détruire         : docker compose down -v
# Lancer Mongosh        : docker exec -it mongodb mongosh